name: Keep Render Alive

on:
  # ОТКЛЮЧЁН 2026-07-21 (консервация). Пинг раз в 10 минут не давал сервису
  # засыпать — на платном плане это было бесплатно, но word-cup-2016 переведён
  # на free, где у воркспейса 750 инстанс-часов в месяц на все сервисы, а
  # неспящий сервис съедает ~730 один. Включать обратно только вместе с
  # возвратом на платный план.
  # schedule:
  #   - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://word-cup-2016.onrender.com/api/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: service returned $STATUS"
          fi
